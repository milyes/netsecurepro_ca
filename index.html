<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA_TERMINAL - NetSecurePro</title>
    <style>
        :root {
            --neon-cyan: #00f0ff;
            --dark-bg: #0a0a0a;
            --glass-bg: rgba(0, 240, 255, 0.05);
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-cyan);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            border: 1px solid var(--neon-cyan);
            padding: 30px;
            background: var(--glass-bg);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
            border-radius: 8px;
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .status-bar {
            text-align: left;
            font-size: 0.8rem;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--neon-cyan);
            padding-bottom: 10px;
            opacity: 0.8;
        }

        p {
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .button {
            display: inline-block;
            padding: 15px 30px;
            background-color: var(--neon-cyan);
            color: #000;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 4px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .button:hover {
            background-color: #000;
            color: var(--neon-cyan);
            box-shadow: 0 0 25px var(--neon-cyan);
            transform: scale(1.05);
        }

        @keyframes blink { 50% { opacity: 0; } }
        .cursor {
            display: inline-block;
            width: 10px;
            height: 15px;
            background: var(--neon-cyan);
            animation: blink 1s step-end infinite;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-bar">
            > SYSTEM: IA_TERMINAL_V2<br>
            > TARGET_ID: 956162516974328<br>
            > STATUS: CONNECTION_READY
        </div>

        <h1>Accès IA_TERMINAL<span class="cursor"></span></h1>
        
        <p>
            Instance de communication active. <br>
            Connectez-vous à l'interface de l'intelligence artificielle via Messenger.
        </p>

        <a href="https://m.me/956162516974328?is_ai=1" class="button" target="_blank">
            Démarrer la Session
        </a>

        <div style="margin-top: 30px; font-size: 0.7rem; opacity: 0.5;">
            Protocol: GHOST ACTIVE | NetSecurePro 2026
        </div>
    </div>

</body>
</html>
