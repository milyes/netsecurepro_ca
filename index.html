<body>

  <header>
    <nav class="navbar">
      <div class="logo">NEURONA</div>
      <ul class="nav-links">
        <li><a href="#home">Accueil</a></li>
        <li><a href="#dashboard">Console</a></li>
        <li><a href="#settings">Paramètres</a></li>
      </ul>
      <div class="status-indicator">
        <span id="system-status">Système Opérationnel</span>

    <section id="hero">
      <h1>Interface de Gestion Intelligente</h1>

          <p class="line">> Initialisation de la matrice...</p>
          <p class="line">> Connexion établie avec succès.</p>
        </div>
      </div>
    </section>
